# Manifiesto para el frontend - CORREGIDO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reps-frontend-deployment
  labels:
    app: reps-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reps-frontend
  template:
    metadata:
      labels:
        app: reps-frontend
    spec:
      containers:
      - name: reps-frontend
        image: danic19/reps-frontend:latest
        ports:
        - containerPort: 80
          name: http
        # Health checks
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: reps-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: reps-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http

